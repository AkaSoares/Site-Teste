<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Site</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #555;
            display: flex;
            justify-content: center;
        }

        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background-color: #777;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>Meu Site no GitHub Pages</h1>
    <p>Treinando HTML básico</p>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#sobre">Sobre</a>
    <a href="#contato">Contato</a>
</nav>

<div class="container">

    <div class="card">
        <h2>Bem-vindo!</h2>
        <p>Esse é meu primeiro site publicado usando GitHub Pages 🚀</p>
    </div>

    <div class="card" id="sobre">
        <h2>Sobre</h2>
        <p>Estou aprendendo HTML, CSS e como publicar sites gratuitamente.</p>
    </div>

    <div class="card" id="contato">
        <h2>Contato</h2>
        <p>Email: seuemail@email.com</p>
    </div>

</div>

<footer>
    <p>© 2026 - Meu Site</p>
</footer>

</body>
</html>
